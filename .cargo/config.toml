# Per-target optimization flags for production builds.
# These enable CPU-specific instruction selection beyond the baseline.

[target.aarch64-apple-darwin]
rustflags = ["-C", "target-cpu=apple-m1"]

[target.aarch64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=neoverse-n1"]  # AWS Graviton2+

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=x86-64-v3"]  # AVX2 baseline (Haswell+)

[target.x86_64-apple-darwin]
rustflags = ["-C", "target-cpu=haswell"]  # AVX2 + FMA for Intel Macs

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-cpu=x86-64-v3"]  # AVX2 baseline for Windows
